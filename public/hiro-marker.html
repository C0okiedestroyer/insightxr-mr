<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
    <title>InsightXR Hiro Marker</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #fff;
        font-family: system-ui, sans-serif;
      }
      main {
        display: grid;
        grid-template-rows: 1fr auto;
        place-items: center;
        width: 100%;
        height: 100%;
        padding: 4vmin;
      }
      img {
        width: min(78vmin, 720px);
        height: min(78vmin, 720px);
        object-fit: contain;
        image-rendering: auto;
      }
      p {
        margin: 0;
        color: #33444a;
        font-size: 12px;
        text-align: center;
      }
      button {
        position: fixed;
        top: 12px;
        right: 12px;
        padding: 9px 12px;
        border: 0;
        border-radius: 8px;
        background: #153741;
        color: white;
        font: inherit;
      }
      @media print {
        button, p { display: none; }
        main { display: grid; padding: 12mm; }
        img { width: 160mm; height: 160mm; }
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/tracking/hiro.png" alt="Single Hiro tracking marker" />
      <p>Keep this one marker fully visible. Do not show search thumbnails or another copy.</p>
    </main>
    <button type="button" onclick="document.documentElement.requestFullscreen?.()">Fullscreen</button>
  </body>
</html>
